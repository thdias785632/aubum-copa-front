<header class="navbar" [class.scrolled]="scrolled">
  <a class="brand" routerLink="/album">
    <img src="assets/aubum.png" alt="AUbum" class="brand-logo" />
    <span class="brand-title">
      <span class="letter a1">A</span>
      <span class="letter u">U</span>
      <span class="letter b">b</span>
      <span class="letter u2">u</span>
      <span class="letter m">m</span>
      <span class="da">&nbsp;da Copa</span>
    </span>
  </a>

  <nav class="links" [class.open]="menuOpen">
    <a
      routerLink="/album"
      routerLinkActive="active"
      (click)="menuOpen = false"
    >
      <span class="material-icons">collections_bookmark</span>
      Álbum
    </a>
    <a
      routerLink="/repetidas"
      routerLinkActive="active"
      (click)="menuOpen = false"
    >
      <span class="material-icons">content_copy</span>
      Repetidas
    </a>
    <a
      routerLink="/troca"
      routerLinkActive="active"
      (click)="menuOpen = false"
    >
      <span class="material-icons">swap_horiz</span>
      Troca
    </a>
    <a
      routerLink="/perfil"
      routerLinkActive="active"
      (click)="menuOpen = false"
    >
      <span class="material-icons">person</span>
      Perfil
    </a>
    <button class="logout" (click)="logout()">
      <span class="material-icons">logout</span>
      Sair
    </button>
  </nav>

  <button class="burger" (click)="toggleMenu()" aria-label="menu">
    <span class="material-icons">{{ menuOpen ? 'close' : 'menu' }}</span>
  </button>
</header>
